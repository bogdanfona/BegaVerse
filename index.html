<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BegaVerse — Digital Twin of Bega River</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Mono:wght@400;700&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/styles/main.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar Navigation -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-wave">
          <svg width="32" height="20" viewBox="0 0 32 20" fill="none">
            <path d="M0 14 Q4 6 8 10 Q12 14 16 6 Q20 -2 24 6 Q28 14 32 10" stroke="#4FC3F7" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <path d="M0 18 Q4 12 8 15 Q12 18 16 12 Q20 6 24 12 Q28 18 32 15" stroke="#4FC3F7" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
          </svg>
        </div>
        <span class="logo-text">BegaVerse</span>
      </div>

      <div class="nav-section">
        <span class="nav-label">Explore</span>
        <a href="#" class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Overview
        </a>
        <a href="#" class="nav-item" data-page="canal" onclick="navigate('canal')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12 Q6 7 9 10 Q12 13 15 7 Q18 1 21 7"/><path d="M3 17 Q6 14 9 16 Q12 18 15 14 Q18 10 21 14"/></svg>
          Bega Canal
        </a>
        <a href="#" class="nav-item" data-page="history" onclick="navigate('history')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
          Time Travel
        </a>
        <a href="#" class="nav-item" data-page="simcity" onclick="navigate('simcity')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 21 L3 9 L9 3 L15 9 L15 21"/><path d="M15 21 L15 12 L21 12 L21 21"/><line x1="9" y1="21" x2="9" y2="14"/><line x1="6" y1="14" x2="12" y2="14"/></svg>
          Land & Build
        </a>
        <a href="#" class="nav-item" data-page="ar" onclick="navigate('ar')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 8 L2 6 Q2 4 4 4 L6 4"/><path d="M18 4 L20 4 Q22 4 22 6 L22 8"/><path d="M22 16 L22 18 Q22 20 20 20 L18 20"/><path d="M6 20 L4 20 Q2 20 2 18 L2 16"/><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="8"/><line x1="12" y1="16" x2="12" y2="22"/></svg>
          AR Scanner
        </a>
      </div>

      <div class="nav-section">
        <span class="nav-label">Monitor</span>
        <a href="#" class="nav-item" data-page="sensors" onclick="navigate('sensors')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          IoT Sensors
        </a>
        <a href="#" class="nav-item" data-page="reports" onclick="navigate('reports')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2 L14 8 L20 8"/><path d="M14 2 L20 8 L20 20 Q20 22 18 22 L6 22 Q4 22 4 20 L4 4 Q4 2 6 2 Z"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>
          Reports
        </a>
        <a href="#" class="nav-item" data-page="blockchain" onclick="navigate('blockchain')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="7" width="6" height="6" rx="1"/><rect x="9" y="7" width="6" height="6" rx="1"/><rect x="16" y="7" width="6" height="6" rx="1"/><line x1="8" y1="10" x2="9" y2="10"/><line x1="15" y1="10" x2="16" y2="10"/></svg>
          Blockchain
        </a>
      </div>

      <div class="sidebar-footer">
        <div class="water-quality-pill good">
          <span class="pulse-dot"></span>
          Water: Good
        </div>
        <span class="version-tag">MVP v0.1 · HackTM 2025</span>
      </div>
    </nav>

    <!-- Mobile Top Bar -->
    <header class="mobile-header">
      <button class="hamburger" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
      </button>
      <div class="mobile-logo">
        <svg width="24" height="15" viewBox="0 0 32 20" fill="none">
          <path d="M0 14 Q4 6 8 10 Q12 14 16 6 Q20 -2 24 6 Q28 14 32 10" stroke="#4FC3F7" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        </svg>
        BegaVerse
      </div>
      <div class="mobile-status good">● Live</div>
    </header>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
      <!-- Pages rendered by JS -->
    </main>
  </div>

  <script src="src/data/mockData.js"></script>
  <script src="src/components/charts.js"></script>
  <script src="src/components/pages.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
